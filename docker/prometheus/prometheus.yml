# Prometheus scrape config for docker-compose app and Pushgateway services.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: llmops_app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:9108

  - job_name: llmops_pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
