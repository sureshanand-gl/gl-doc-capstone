# Prometheus scrape targets for single-host Cloud Run sidecar topology.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: llmops_app
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9108

  - job_name: llmops_pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - 127.0.0.1:9091
